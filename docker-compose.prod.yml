version: '3.8'

# Secrets prod lus depuis .env.prod (gitignoré). Les services utilisent .env.prod via
# `env_file`, MAIS l'interpolation ${VAR} (postgres/minio/domaine) est résolue par Compose
# depuis son fichier d'env par défaut. Lancer en passant explicitement --env-file pour que
# TOUT lise .env.prod :
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#   docker compose --env-file .env.prod -f docker-compose.prod.yml pull   # si images GHCR

services:
  # Reverse proxy TLS — seul service exposé sur l'hôte (80/443).
  # Cf. Caddyfile à la racine. TLS Let's Encrypt automatique.
  caddy:
    image: caddy:2-alpine
    container_name: howners-caddy
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - howners-network
    restart: unless-stopped

  backend:
    # Build local par défaut. Pour déployer l'image construite par la CI (GHCR),
    # commenter `build:` et décommenter `image:` ci-dessous, puis `docker compose pull`.
    # image: ghcr.io/m-annabi/howners-backend:latest
    build:
      context: ./howners-back
      dockerfile: Dockerfile
    container_name: howners-backend
    env_file: .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: http://minio:9000
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - howners-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    # image: ghcr.io/m-annabi/howners-frontend:latest   # cf. note sur le service backend
    build:
      context: ./howners-api
      dockerfile: Dockerfile
    container_name: howners-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - howners-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: howners-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - howners-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: howners-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - howners-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: howners-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/$${MINIO_BUCKET} --ignore-existing;
      /usr/bin/mc anonymous set none myminio/$${MINIO_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks:
      - howners-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  howners-network:
    driver: bridge
