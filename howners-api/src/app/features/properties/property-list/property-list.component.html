<app-page-header
  title="Mes Biens"
  [breadcrumbs]="[{label: 'Tableau de bord', route: '/dashboard'}, {label: 'Biens'}]"
  [actions]="headerActions">
</app-page-header>

<ng-template #headerActions>
  <button class="hw-btn hw-btn--primary" (click)="navigateToCreate()">
    <i class="bi bi-plus-lg"></i> Ajouter un bien
  </button>
</ng-template>

<!-- Toolbar: filter chips + search -->
<div *ngIf="!loading && properties.length > 0" class="property-list__toolbar">
  <app-quick-filters
    [filters]="filters"
    [activeKey]="activeFilter"
    (filterChange)="onFilterChange($event)">
  </app-quick-filters>

  <div class="property-list__search">
    <i class="bi bi-search"></i>
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="filterProperties()"
      placeholder="Rechercher par nom, ville ou code postal..."
      class="form-control">
  </div>
</div>

<!-- Loading -->
<app-loading-skeleton *ngIf="loading" type="card" [count]="6"></app-loading-skeleton>

<!-- Error -->
<div *ngIf="error" class="hw-alert hw-alert--danger">
  <i class="bi bi-exclamation-triangle-fill"></i>
  <span>{{ error }}</span>
</div>

<!-- Empty -->
<app-empty-state
  *ngIf="!loading && !error && filteredProperties.length === 0 && properties.length === 0"
  icon="bi-building"
  title="Aucun bien"
  message="Commencez par ajouter votre premier bien immobilier."
  actionLabel="Ajouter un bien"
  actionRoute="/properties/new">
</app-empty-state>

<!-- No search results -->
<app-empty-state
  *ngIf="!loading && !error && filteredProperties.length === 0 && properties.length > 0"
  icon="bi-search"
  title="Aucun résultat"
  message="Essayez avec d'autres termes de recherche.">
</app-empty-state>

<!-- Dense table -->
<div *ngIf="!loading && !error && filteredProperties.length > 0" class="hw-card property-table-wrap">
  <table class="property-table">
    <thead>
      <tr>
        <th class="property-table__col-thumb"></th>
        <th class="property-table__col-name">Bien</th>
        <th class="property-table__col-city">Localisation</th>
        <th class="property-table__col-type">Type</th>
        <th class="property-table__col-surface">Surface</th>
        <th class="property-table__col-rooms">Pièces</th>
        <th class="property-table__col-actions"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let property of filteredProperties"
          class="property-row"
          (click)="viewProperty(property.id)">

        <td class="property-table__col-thumb">
          <div class="property-thumb" *ngIf="property.primaryPhotoUrl">
            <img [src]="property.primaryPhotoUrl" [alt]="property.name" />
          </div>
          <div class="property-thumb property-thumb--placeholder" *ngIf="!property.primaryPhotoUrl">
            <i class="bi bi-building"></i>
          </div>
        </td>

        <td class="property-table__col-name">
          <div class="property-table__name">{{ property.name }}</div>
        </td>

        <td class="property-table__col-city">
          <span class="property-table__city">{{ property.address.city }}</span>
          <span class="property-table__postal">{{ property.address.postalCode }}</span>
        </td>

        <td class="property-table__col-type">
          <span class="badge bg-light">{{ propertyTypeLabels[property.propertyType] }}</span>
        </td>

        <td class="property-table__col-surface">
          <ng-container *ngIf="property.surfaceArea">{{ property.surfaceArea }} m²</ng-container>
          <span *ngIf="!property.surfaceArea" class="property-table__empty">—</span>
        </td>

        <td class="property-table__col-rooms">
          <span *ngIf="property.bedrooms">{{ property.bedrooms }} ch.</span>
          <span *ngIf="!property.bedrooms" class="property-table__empty">—</span>
        </td>

        <td class="property-table__col-actions" (click)="$event.stopPropagation()">
          <div class="row-actions">
            <button class="row-actions__btn"
                    (click)="editProperty(property.id, $event)"
                    title="Modifier">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="row-actions__btn"
                    (click)="viewProfitability(property.id, $event)"
                    title="Rentabilité">
              <i class="bi bi-graph-up"></i>
            </button>
            <button class="row-actions__btn row-actions__btn--danger"
                    (click)="deleteProperty(property.id, $event)"
                    title="Supprimer">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
