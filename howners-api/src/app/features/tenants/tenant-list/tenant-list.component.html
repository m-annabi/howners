<div class="tl-page">

  <app-page-header title="Locataires" subtitle="Vos locataires actuels et passés"></app-page-header>

  <app-loading-skeleton *ngIf="loading" type="card" [count]="4"></app-loading-skeleton>

  <div *ngIf="!loading && tenants.length === 0" class="hw-card tl-empty">
    <div class="hw-icon-circle hw-icon-circle--neutral mx-auto mb-3">
      <i class="bi bi-people"></i>
    </div>
    <p class="hw-text-muted">Aucun locataire pour l'instant.</p>
  </div>

  <div *ngIf="!loading && tenants.length > 0" class="tl-list">
    <div *ngFor="let t of tenants"
         class="hw-card hw-card--clickable tl-item"
         (click)="openProfile(t.id)">
      <div class="tl-item__avatar">{{ initials(t) }}</div>
      <div class="tl-item__info">
        <div class="tl-item__name">{{ t.firstName }} {{ t.lastName }}</div>
        <div class="tl-item__contact hw-text-sm hw-text-muted">
          <span><i class="bi bi-envelope"></i> {{ t.email }}</span>
          <span *ngIf="t.phone"><i class="bi bi-telephone"></i> {{ t.phone }}</span>
        </div>
      </div>
      <i class="bi bi-chevron-right tl-item__chev hw-text-muted"></i>
    </div>
  </div>

</div>
