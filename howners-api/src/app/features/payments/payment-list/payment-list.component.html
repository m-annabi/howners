<app-page-header
  title="Paiements"
  [breadcrumbs]="[{label: 'Tableau de bord', route: '/dashboard'}, {label: 'Paiements'}]"
  [actions]="headerActions">
</app-page-header>

<ng-template #headerActions>
  <button *ngIf="!isTenant" class="hw-btn hw-btn--primary" (click)="createPayment()">
    <i class="bi bi-plus-lg"></i> Nouveau Paiement
  </button>
</ng-template>

<!-- Toolbar: filter chips + search -->
<div *ngIf="!loading && payments.length > 0" class="payment-list__toolbar">
  <app-quick-filters
    [filters]="filters"
    [activeKey]="selectedStatus"
    (filterChange)="onFilterChange($event)">
  </app-quick-filters>

  <div class="payment-list__search">
    <i class="bi bi-search"></i>
    <input
      type="text"
      class="form-control"
      placeholder="Rechercher par bien ou payeur..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()">
  </div>
</div>

<!-- Loading -->
<app-loading-skeleton *ngIf="loading" type="table" [count]="8"></app-loading-skeleton>

<!-- Error -->
<div *ngIf="error" class="hw-alert hw-alert--danger">
  <i class="bi bi-exclamation-triangle-fill"></i>
  <span>{{ error }}</span>
</div>

<!-- Empty — TENANT -->
<app-empty-state
  *ngIf="!loading && !error && payments.length === 0 && isTenant"
  icon="bi-credit-card"
  title="Aucun paiement en cours"
  message="Vous n'avez pas encore de paiement à effectuer.">
</app-empty-state>

<!-- Empty — OWNER -->
<app-empty-state
  *ngIf="!loading && !error && payments.length === 0 && !isTenant"
  icon="bi-credit-card"
  title="Aucun paiement"
  message="Créez votre premier paiement pour commencer le suivi."
  actionLabel="Nouveau paiement"
  actionRoute="/payments/new">
</app-empty-state>

<!-- No results -->
<app-empty-state
  *ngIf="!loading && !error && filteredPayments.length === 0 && payments.length > 0"
  icon="bi-search"
  title="Aucun résultat"
  message="Essayez d'autres termes ou changez de filtre.">
</app-empty-state>

<!-- Dense table -->
<div *ngIf="!loading && !error && filteredPayments.length > 0" class="hw-card payment-table-wrap">
  <table class="payment-table">
    <thead>
      <tr>
        <th>Bien</th>
        <th>Payeur</th>
        <th class="payment-table__col-type">Type</th>
        <th class="payment-table__col-amount">Montant</th>
        <th class="payment-table__col-date">Échéance</th>
        <th class="payment-table__col-status">Statut</th>
        <th class="payment-table__col-actions"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let payment of filteredPayments"
          class="payment-row"
          [class.payment-row--overdue]="isOverdue(payment)"
          (click)="viewPayment(payment)">

        <td>
          <div class="payment-table__property">{{ payment.propertyName }}</div>
        </td>

        <td>{{ payment.payerName }}</td>

        <td class="payment-table__col-type">
          <span class="badge bg-light">{{ getTypeLabel(payment.paymentType) }}</span>
        </td>

        <td class="payment-table__col-amount">
          <div class="payment-table__amount">{{ payment.amount | number:'1.2-2' }} {{ payment.currency }}</div>
        </td>

        <td class="payment-table__col-date">
          <div [class.payment-table__overdue]="isOverdue(payment)">
            {{ payment.dueDate | date:'dd/MM/yyyy' }}
          </div>
        </td>

        <td class="payment-table__col-status">
          <app-status-badge [status]="payment.status" type="payment"></app-status-badge>
          <span *ngIf="payment.relanceNiveau === 1" class="badge bg-warning text-dark payment-table__relance"
                title="Relance envoyée le {{ payment.derniereRelanceLe | date:'dd/MM/yyyy' }}">
            Relancé
          </span>
          <span *ngIf="payment.relanceNiveau === 2" class="badge bg-danger payment-table__relance"
                title="Mise en demeure envoyée le {{ payment.derniereRelanceLe | date:'dd/MM/yyyy' }}">
            Mise en demeure
          </span>
        </td>

        <td class="payment-table__col-actions" (click)="$event.stopPropagation()">
          <div class="row-actions">
            <button *ngIf="!isTenant && payment.status !== PaymentStatus.PAID && payment.status !== PaymentStatus.REFUNDED"
                    class="row-actions__btn row-actions__btn--success"
                    (click)="markPaid(payment, $event)"
                    title="Marquer payé">
              <i class="bi bi-check2"></i>
            </button>
            <button *ngIf="!isTenant && payment.status === PaymentStatus.LATE && payment.relanceNiveau < 2"
                    class="row-actions__btn row-actions__btn--warning"
                    (click)="relancer(payment, $event)"
                    [title]="payment.relanceNiveau === 0 ? 'Envoyer une relance' : 'Envoyer la mise en demeure'">
              <i class="bi bi-megaphone"></i>
            </button>
            <button class="row-actions__btn"
                    (click)="viewPayment(payment); $event.stopPropagation()"
                    title="Voir">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
