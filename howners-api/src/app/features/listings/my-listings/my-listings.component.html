<app-page-header
  title="Mes annonces"
  [breadcrumbs]="[{label: 'Tableau de bord', route: '/dashboard'}, {label: 'Annonces'}]"
  [actions]="headerActions">
</app-page-header>

<ng-template #headerActions>
  <a routerLink="/listings/new" class="hw-btn hw-btn--primary">
    <i class="bi bi-plus-lg"></i> Nouvelle annonce
  </a>
</ng-template>

<div *ngIf="error" class="hw-alert hw-alert--danger">
  <i class="bi bi-exclamation-triangle-fill"></i>
  <span>{{ error }}</span>
</div>

<app-loading-skeleton *ngIf="loading" type="card" [count]="5"></app-loading-skeleton>

<app-empty-state
  *ngIf="!loading && listings.length === 0"
  icon="bi-megaphone"
  title="Aucune annonce créée"
  message="Publiez votre première annonce pour commencer à recevoir des candidatures."
  actionLabel="Créer une annonce"
  actionRoute="/listings/new">
</app-empty-state>

<div *ngIf="!loading && listings.length > 0" class="hw-card listings-table-wrap">
  <table class="listings-table">
    <thead>
      <tr>
        <th>Titre</th>
        <th>Propriété</th>
        <th>Prix</th>
        <th>Statut</th>
        <th>Publiée le</th>
        <th class="listings-table__col-actions"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let listing of listings">
        <td>
          <a [routerLink]="['/listings', listing.id]" class="listings-table__title">{{ listing.title }}</a>
        </td>
        <td class="listings-table__muted">{{ listing.propertyName }}</td>
        <td>
          <span *ngIf="listing.pricePerMonth">{{ listing.pricePerMonth | number:'1.0-0' }} €/mois</span>
          <span *ngIf="listing.pricePerNight && listing.pricePerMonth"> · </span>
          <span *ngIf="listing.pricePerNight">{{ listing.pricePerNight | number:'1.0-0' }} €/nuit</span>
        </td>
        <td><app-status-badge [status]="listing.status" type="listing"></app-status-badge></td>
        <td class="listings-table__muted">{{ listing.publishedAt ? (listing.publishedAt | date:'dd/MM/yyyy') : '—' }}</td>
        <td>
          <div class="listings-table__actions">
            <a [routerLink]="['/listings', listing.id, 'edit']" class="hw-btn hw-btn--sm hw-btn--ghost" title="Modifier">
              <i class="bi bi-pencil"></i>
            </a>
            <button *ngIf="canPublish(listing)" class="hw-btn hw-btn--sm hw-btn--ghost" (click)="publish(listing.id)" title="Publier">
              <i class="bi bi-globe"></i>
            </button>
            <button *ngIf="canPause(listing)" class="hw-btn hw-btn--sm hw-btn--ghost" (click)="pause(listing.id)" title="Mettre en pause">
              <i class="bi bi-pause-circle"></i>
            </button>
            <button *ngIf="canClose(listing)" class="hw-btn hw-btn--sm hw-btn--ghost" (click)="close(listing.id)" title="Fermer">
              <i class="bi bi-x-circle"></i>
            </button>
            <button class="hw-btn hw-btn--sm hw-btn--ghost listings-table__danger" (click)="delete(listing.id)" title="Supprimer">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
