<app-page-header
  [title]="isEditMode ? 'Modifier l\'annonce' : 'Nouvelle annonce'"
  [breadcrumbs]="[{label: 'Annonces', route: '/listings/my'}, {label: isEditMode ? 'Modifier' : 'Nouvelle'}]">
</app-page-header>

<app-loading-skeleton *ngIf="loading" type="card" [count]="2"></app-loading-skeleton>

<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="row">
    <div class="col-lg-8">
      <div class="hw-card mb-4">
        <h5 class="form-section-title">Informations générales</h5>
        <div class="mb-3">
          <label for="propertyId" class="form-label">Propriété *</label>
          <select id="propertyId" class="form-select" formControlName="propertyId">
            <option value="">Sélectionner une propriété</option>
            <option *ngFor="let p of properties" [value]="p.id">{{ p.name }} - {{ p.address?.city }}</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="title" class="form-label">Titre de l'annonce *</label>
          <input id="title" type="text" class="form-control" formControlName="title"
                 placeholder="Ex: Appartement lumineux T3 centre-ville">
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea id="description" class="form-control" formControlName="description" rows="5"
                    placeholder="Décrivez le bien en détail..."></textarea>
        </div>
      </div>

      <div class="hw-card mb-4">
        <h5 class="form-section-title">Tarification et durée</h5>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label for="pricePerMonth" class="form-label">Loyer mensuel</label>
            <div class="input-group">
              <input id="pricePerMonth" type="number" class="form-control" formControlName="pricePerMonth">
              <span class="input-group-text">€/mois</span>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <label for="pricePerNight" class="form-label">Prix par nuit</label>
            <div class="input-group">
              <input id="pricePerNight" type="number" class="form-control" formControlName="pricePerNight">
              <span class="input-group-text">€/nuit</span>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <label for="availableFrom" class="form-label">Disponible dès</label>
            <input id="availableFrom" type="date" class="form-control" formControlName="availableFrom">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="minStay" class="form-label">Durée min (jours)</label>
            <input id="minStay" type="number" class="form-control" formControlName="minStay">
          </div>
          <div class="col-md-6 mb-3">
            <label for="maxStay" class="form-label">Durée max (jours)</label>
            <input id="maxStay" type="number" class="form-control" formControlName="maxStay">
          </div>
        </div>
      </div>

      <!-- Photos -->
      <div class="hw-card mb-4">
        <h5 class="form-section-title"><i class="bi bi-images me-2"></i>Photos</h5>
        <div *ngIf="isEditMode && listingId">
          <div *ngIf="listingPhotos.length > 0" class="row g-3 mb-3">
            <div *ngFor="let photo of listingPhotos" class="col-6 col-md-4 col-lg-3">
              <div class="position-relative">
                <img [src]="photo.fileUrl" [alt]="photo.caption || photo.fileName"
                     class="img-fluid rounded" style="height: 120px; width: 100%; object-fit: cover;">
                <span *ngIf="photo.isPrimary" class="hw-badge hw-badge--secondary position-absolute top-0 start-0 m-1">
                  Couverture
                </span>
                <button type="button" class="hw-btn hw-btn--sm hw-btn--ghost position-absolute top-0 end-0 m-1"
                        (click)="deletePhoto(photo)" title="Supprimer">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
              <small class="hw-text-muted d-block text-truncate mt-1">{{ photo.caption || photo.fileName }}</small>
            </div>
          </div>

          <app-listing-photo-upload
            [listingId]="listingId"
            [currentPhotoCount]="listingPhotos.length"
            (photoUploaded)="onPhotoUploaded($event)">
          </app-listing-photo-upload>
        </div>

        <div *ngIf="!isEditMode" class="hw-text-muted text-center py-3">
          <i class="bi bi-info-circle me-1"></i>
          Enregistrez l'annonce pour ajouter des photos
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <!-- Équipements -->
      <div class="hw-card mb-4">
        <h5 class="form-section-title"><i class="bi bi-check2-square me-2"></i>Équipements</h5>
        <div class="row g-2">
          <div *ngFor="let amenity of predefinedAmenities" class="col-6">
            <div class="form-check" (click)="toggleAmenity(amenity.key)" style="cursor: pointer;">
              <input class="form-check-input" type="checkbox"
                     [checked]="selectedAmenities.has(amenity.key)"
                     [id]="'amenity-' + amenity.key">
              <label class="form-check-label" [for]="'amenity-' + amenity.key" style="cursor: pointer;">
                <i class="bi {{ amenity.icon }} me-1"></i>{{ amenity.label }}
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Conditions -->
      <div class="hw-card mb-4">
        <h5 class="form-section-title"><i class="bi bi-exclamation-triangle me-2"></i>Conditions</h5>
        <div class="row g-2">
          <div *ngFor="let req of predefinedRequirements" class="col-12">
            <div class="form-check" (click)="toggleRequirement(req.key)" style="cursor: pointer;">
              <input class="form-check-input" type="checkbox"
                     [checked]="selectedRequirements.has(req.key)"
                     [id]="'req-' + req.key">
              <label class="form-check-label" [for]="'req-' + req.key" style="cursor: pointer;">
                <i class="bi {{ req.icon }} me-1"></i>{{ req.label }}
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="hw-btn hw-btn--primary" [disabled]="form.invalid || submitting">
          <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
          {{ isEditMode ? 'Mettre à jour' : 'Créer l\'annonce' }}
        </button>
        <a routerLink="/listings/my" class="hw-btn hw-btn--ghost">Annuler</a>
      </div>
    </div>
  </div>
</form>
