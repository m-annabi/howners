<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>États des lieux</h2>
  </div>

  <div class="row mb-3">
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="filterType" (change)="applyFilter()">
        <option value="">Tous les types</option>
        <option value="ENTREE">Entrée</option>
        <option value="SORTIE">Sortie</option>
      </select>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
  </div>

  <div *ngIf="!loading && filteredEdls.length === 0" class="text-center py-5">
    <i class="bi bi-clipboard-check display-1 text-muted"></i>
    <p class="mt-3 text-muted">Aucun état des lieux trouvé</p>
  </div>

  <div class="table-responsive" *ngIf="!loading && filteredEdls.length > 0">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Bien</th>
          <th>Locataire</th>
          <th>Type</th>
          <th>Date</th>
          <th>Signatures</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let edl of filteredEdls" style="cursor: pointer;" (click)="viewDetail(edl)">
          <td><strong>{{ edl.propertyName }}</strong></td>
          <td>{{ edl.tenantName || 'N/A' }}</td>
          <td>
            <span class="badge bg-{{ typeColors[edl.type] }}">
              {{ typeLabels[edl.type] }}
            </span>
          </td>
          <td>{{ edl.inspectionDate | date:'dd/MM/yyyy' }}</td>
          <td>
            <span class="badge bg-{{ getSignatureBadge(edl) }}">
              {{ getSignatureStatus(edl) }}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-outline-primary" (click)="viewDetail(edl); $event.stopPropagation()">
              <i class="bi bi-eye"></i> Détail
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
