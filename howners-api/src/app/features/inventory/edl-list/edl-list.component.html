<app-page-header
  title="États des lieux"
  [breadcrumbs]="[{label: 'Tableau de bord', route: '/dashboard'}, {label: 'États des lieux'}]">
</app-page-header>

<!-- Toolbar: filter chips + search -->
<div *ngIf="!loading && edls.length > 0" class="edl-list__toolbar">
  <app-quick-filters
    [filters]="filters"
    [activeKey]="activeFilter"
    (filterChange)="onFilterChange($event)">
  </app-quick-filters>

  <div class="edl-list__search">
    <i class="bi bi-search"></i>
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="applyFilters()"
      placeholder="Rechercher par bien ou locataire..."
      class="form-control">
  </div>
</div>

<!-- Loading -->
<app-loading-skeleton *ngIf="loading" type="card" [count]="4"></app-loading-skeleton>

<!-- Error -->
<div *ngIf="error" class="hw-alert hw-alert--danger">
  <i class="bi bi-exclamation-triangle-fill"></i>
  <span>{{ error }}</span>
</div>

<!-- Empty -->
<app-empty-state
  *ngIf="!loading && !error && edls.length === 0"
  icon="bi-clipboard-check"
  title="Aucun état des lieux"
  message="Les états des lieux sont créés depuis la page d'une location.">
</app-empty-state>

<!-- No results -->
<app-empty-state
  *ngIf="!loading && !error && filteredEdls.length === 0 && edls.length > 0"
  icon="bi-search"
  title="Aucun résultat"
  message="Essayez d'autres termes ou changez de filtre.">
</app-empty-state>

<!-- Dense table -->
<div *ngIf="!loading && !error && filteredEdls.length > 0" class="hw-card edl-table-wrap">
  <table class="edl-table">
    <thead>
      <tr>
        <th class="sortable" [class.sorted]="sortCol==='property'" (click)="sortOn('property')">Bien <i class="bi" [ngClass]="sortIcon('property')"></i></th>
        <th class="sortable" [class.sorted]="sortCol==='tenant'" (click)="sortOn('tenant')">Locataire <i class="bi" [ngClass]="sortIcon('tenant')"></i></th>
        <th class="sortable" [class.sorted]="sortCol==='type'" (click)="sortOn('type')">Type <i class="bi" [ngClass]="sortIcon('type')"></i></th>
        <th class="sortable" [class.sorted]="sortCol==='date'" (click)="sortOn('date')">Date <i class="bi" [ngClass]="sortIcon('date')"></i></th>
        <th>Signatures</th>
        <th class="edl-table__col-actions"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let edl of filteredEdls" class="edl-row" (click)="viewDetail(edl)">

        <td>
          <div class="edl-table__property">{{ edl.propertyName }}</div>
        </td>

        <td>
          <ng-container *ngIf="edl.tenantName">{{ edl.tenantName }}</ng-container>
          <span *ngIf="!edl.tenantName" class="edl-table__muted">—</span>
        </td>

        <td>
          <app-status-badge [status]="edl.type" type="edl"></app-status-badge>
        </td>

        <td>{{ edl.inspectionDate | date:'dd/MM/yyyy' }}</td>

        <td>
          <span class="hw-badge" [attr.data-tone]="getSignatureTone(edl)">
            {{ getSignatureStatus(edl) }}
          </span>
        </td>

        <td class="edl-table__col-actions" (click)="$event.stopPropagation()">
          <div class="row-actions">
            <button class="row-actions__btn" (click)="viewDetail(edl); $event.stopPropagation()" title="Voir">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
