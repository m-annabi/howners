<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-chat-dots"></i> Messages</h2>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="!loading && conversations.length === 0" class="text-center py-5">
    <i class="bi bi-chat-square display-1 text-muted"></i>
    <p class="text-muted mt-3">Aucune conversation</p>
  </div>

  <div class="list-group" *ngIf="!loading && conversations.length > 0">
    <a *ngFor="let conv of conversations"
       [routerLink]="['/messages', conv.partnerId]"
       class="list-group-item list-group-item-action"
       [class.list-group-item-light]="!conv.lastMessageRead && conv.unreadCount > 0">
      <div class="d-flex justify-content-between align-items-start">
        <div class="d-flex align-items-center">
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3"
               style="width: 45px; height: 45px; font-size: 1.1rem;">
            {{ conv.partnerName.charAt(0).toUpperCase() }}
          </div>
          <div>
            <h6 class="mb-1" [class.fw-bold]="conv.unreadCount > 0">{{ conv.partnerName }}</h6>
            <p class="mb-0 text-muted small text-truncate" style="max-width: 400px;">
              {{ conv.lastMessageBody }}
            </p>
          </div>
        </div>
        <div class="text-end">
          <small class="text-muted d-block">{{ conv.lastMessageAt | date:'dd/MM HH:mm' }}</small>
          <span *ngIf="conv.unreadCount > 0" class="badge bg-danger rounded-pill mt-1">
            {{ conv.unreadCount }}
          </span>
        </div>
      </div>
    </a>
  </div>
</div>
