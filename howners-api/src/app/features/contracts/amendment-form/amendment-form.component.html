<div class="container mt-4">
  <h2>Nouvel avenant</h2>
  <p class="text-muted" *ngIf="contract">Contrat {{ contract.contractNumber }}</p>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
  </div>

  <form *ngIf="!loading" (ngSubmit)="submit()">
    <div class="card">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Motif de l'avenant <span class="text-danger">*</span></label>
          <textarea class="form-control" [(ngModel)]="reason" name="reason" rows="3"
                    placeholder="Décrivez le motif de l'avenant..." required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Détails des modifications</label>
          <textarea class="form-control" [(ngModel)]="changes" name="changes" rows="4"
                    placeholder="Détaillez les modifications apportées au contrat..."></textarea>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Ancien loyer (EUR)</label>
            <input type="number" class="form-control" [(ngModel)]="previousRent" name="previousRent"
                   step="0.01" min="0" placeholder="0.00">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Nouveau loyer (EUR)</label>
            <input type="number" class="form-control" [(ngModel)]="newRent" name="newRent"
                   step="0.01" min="0" placeholder="0.00">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Date d'effet <span class="text-danger">*</span></label>
            <input type="date" class="form-control" [(ngModel)]="effectiveDate" name="effectiveDate" required>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-3 d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="submitting || !reason || !effectiveDate">
        <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
        Créer l'avenant
      </button>
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Annuler</button>
    </div>
  </form>
</div>
