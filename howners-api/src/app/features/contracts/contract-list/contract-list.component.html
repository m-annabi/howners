<app-page-header
  title="Mes Contrats"
  [breadcrumbs]="[{label: 'Tableau de bord', route: '/dashboard'}, {label: 'Contrats'}]"
  [actions]="headerActions">
</app-page-header>

<ng-template #headerActions>
  <button class="hw-btn hw-btn--primary" (click)="createContract()">
    <i class="bi bi-plus-lg"></i> Nouveau Contrat
  </button>
</ng-template>

<!-- Toolbar: filter chips + search -->
<div *ngIf="!loading && contracts.length > 0" class="contract-list__toolbar">
  <app-quick-filters
    [filters]="filters"
    [activeKey]="selectedStatus"
    (filterChange)="onFilterChange($event)">
  </app-quick-filters>

  <div class="contract-list__search">
    <i class="bi bi-search"></i>
    <input
      type="text"
      class="form-control"
      placeholder="Rechercher par numéro, bien ou locataire..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()">
  </div>
</div>

<!-- Loading -->
<app-loading-skeleton *ngIf="loading" type="card" [count]="6"></app-loading-skeleton>

<!-- Error -->
<div *ngIf="error" class="hw-alert hw-alert--danger">
  <i class="bi bi-exclamation-triangle-fill"></i>
  <span>{{ error }}</span>
</div>

<!-- Empty -->
<app-empty-state
  *ngIf="!loading && !error && contracts.length === 0"
  icon="bi-file-earmark-text"
  title="Aucun contrat"
  message="Créez votre premier contrat de location."
  actionLabel="Nouveau contrat"
  actionRoute="/contracts/new">
</app-empty-state>

<!-- No results -->
<app-empty-state
  *ngIf="!loading && !error && filteredContracts.length === 0 && contracts.length > 0"
  icon="bi-search"
  title="Aucun résultat"
  message="Essayez d'autres termes ou changez de filtre.">
</app-empty-state>

<!-- Dense table -->
<div *ngIf="!loading && !error && filteredContracts.length > 0" class="hw-card contract-table-wrap">
  <table class="contract-table">
    <thead>
      <tr>
        <th>N° de contrat</th>
        <th>Bien</th>
        <th>Locataire</th>
        <th class="contract-table__col-version">Version</th>
        <th>Créé le</th>
        <th class="contract-table__col-status">Statut</th>
        <th class="contract-table__col-actions"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let contract of filteredContracts"
          class="contract-row"
          (click)="viewContract(contract)">

        <td>
          <div class="contract-table__number">{{ contract.contractNumber }}</div>
        </td>

        <td>{{ contract.rentalPropertyName }}</td>

        <td>{{ contract.tenantFullName }}</td>

        <td class="contract-table__col-version">v{{ contract.currentVersion }}</td>

        <td>{{ contract.createdAt | date:'dd/MM/yyyy' }}</td>

        <td class="contract-table__col-status">
          <app-status-badge [status]="contract.status" type="contract"></app-status-badge>
        </td>

        <td class="contract-table__col-actions" (click)="$event.stopPropagation()">
          <div class="row-actions">
            <button class="row-actions__btn"
                    (click)="viewContract(contract); $event.stopPropagation()"
                    title="Voir">
              <i class="bi bi-eye"></i>
            </button>
            <button *ngIf="contract.status === ContractStatus.DRAFT"
                    class="row-actions__btn row-actions__btn--danger"
                    (click)="deleteContract(contract, $event)"
                    title="Supprimer">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
