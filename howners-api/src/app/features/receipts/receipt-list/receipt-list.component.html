<app-page-header
  title="Quittances de loyer"
  [breadcrumbs]="[{label: 'Tableau de bord', route: '/dashboard'}, {label: 'Quittances'}]">
</app-page-header>

<!-- Toolbar: search -->
<div *ngIf="!loading && receipts.length > 0" class="receipt-list__toolbar">
  <div class="receipt-list__search">
    <i class="bi bi-search"></i>
    <input
      type="text"
      class="form-control"
      placeholder="Rechercher par numéro, bien ou locataire..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()">
  </div>
</div>

<!-- Loading -->
<app-loading-skeleton *ngIf="loading" type="table" [count]="6"></app-loading-skeleton>

<!-- Error -->
<div *ngIf="error" class="hw-alert hw-alert--danger">
  <i class="bi bi-exclamation-triangle-fill"></i>
  <span>{{ error }}</span>
</div>

<!-- Empty -->
<app-empty-state
  *ngIf="!loading && !error && receipts.length === 0"
  icon="bi-file-earmark-check"
  title="Aucune quittance"
  message="Les quittances seront générées automatiquement après confirmation des paiements.">
</app-empty-state>

<!-- No results -->
<app-empty-state
  *ngIf="!loading && !error && filteredReceipts.length === 0 && receipts.length > 0"
  icon="bi-search"
  title="Aucun résultat"
  message="Essayez d'autres termes de recherche.">
</app-empty-state>

<!-- Dense table -->
<div *ngIf="!loading && !error && filteredReceipts.length > 0" class="hw-card receipt-table-wrap">
  <table class="receipt-table">
    <thead>
      <tr>
        <th>Numéro</th>
        <th>Bien</th>
        <th>Locataire</th>
        <th class="receipt-table__col-period">Période</th>
        <th class="receipt-table__col-amount">Montant</th>
        <th class="receipt-table__col-actions"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let receipt of filteredReceipts"
          class="receipt-row"
          (click)="viewReceipt(receipt)">
        <td><div class="receipt-table__number">{{ receipt.receiptNumber }}</div></td>
        <td>{{ receipt.propertyName }}</td>
        <td>{{ receipt.tenantName }}</td>
        <td class="receipt-table__col-period">
          <div>{{ receipt.periodStart | date:'dd/MM/yyyy' }}</div>
          <div class="receipt-table__muted">→ {{ receipt.periodEnd | date:'dd/MM/yyyy' }}</div>
        </td>
        <td class="receipt-table__col-amount">
          <div class="receipt-table__amount">{{ receipt.amount | number:'1.2-2' }} {{ receipt.currency }}</div>
        </td>
        <td class="receipt-table__col-actions" (click)="$event.stopPropagation()">
          <div class="row-actions">
            <button class="row-actions__btn"
                    (click)="downloadPdf(receipt, $event)"
                    title="Télécharger PDF">
              <i class="bi bi-download"></i>
            </button>
            <button class="row-actions__btn"
                    (click)="viewReceipt(receipt); $event.stopPropagation()"
                    title="Voir">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
