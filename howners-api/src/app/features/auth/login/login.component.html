<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <div class="auth-card__logo">
        <i class="bi bi-house-door-fill"></i>
      </div>
      <h1>Connexion</h1>
      <p>Bienvenue sur Howners</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div *ngIf="error" class="hw-alert hw-alert--danger" style="margin-bottom: var(--hw-space-4)">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span>{{ error }}</span>
      </div>

      <div class="auth-field">
        <label class="form-label" for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          placeholder="votre@email.com"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
        <div class="invalid-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Veuillez entrer une adresse email valide
        </div>
      </div>

      <div class="auth-field">
        <label class="form-label" for="password">Mot de passe</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            class="form-control"
            placeholder="Votre mot de passe"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <button
            type="button"
            class="password-toggle"
            (click)="showPassword = !showPassword"
            tabindex="-1"
          >
            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Mot de passe requis (min. 6 caractères)
        </div>
      </div>

      <button
        type="submit"
        class="hw-btn hw-btn--primary hw-btn--lg hw-btn--block"
        [disabled]="loading || loginForm.invalid"
      >
        <i *ngIf="loading" class="bi bi-arrow-repeat spin"></i>
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>

      <p class="auth-card__footer">
        Pas encore de compte ? <a routerLink="/auth/register">Créer un compte</a>
      </p>
    </form>
  </div>
</div>
