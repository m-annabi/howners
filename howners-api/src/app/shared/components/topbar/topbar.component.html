<div class="topbar">

  <!-- Hamburger (mobile) -->
  <button class="topbar__toggle" (click)="onToggleSidebar()" aria-label="Menu">
    <i class="bi bi-list"></i>
  </button>

  <div class="topbar__spacer"></div>

  <!-- Contrôles à droite -->
  <div class="topbar__right">

    <!-- User -->
    <button class="topbar__user" (click)="toggleDropdown()">
      <div class="topbar__avatar">{{ userInitials }}</div>
      <span class="topbar__username">{{ userFirstName }}</span>
    </button>

    <!-- Dropdown utilisateur -->
    <div *ngIf="dropdownOpen" class="topbar__dropdown">
      <div class="topbar__dropdown-header">
        <div class="topbar__avatar topbar__avatar--lg">{{ userInitials }}</div>
        <div class="topbar__dropdown-info">
          <div class="topbar__dropdown-name">{{ userName }}</div>
          <div class="topbar__dropdown-role">{{ userRoleLabel }}</div>
        </div>
      </div>
      <div class="topbar__dropdown-divider"></div>
      <a class="topbar__dropdown-item" routerLink="/profile">
        <i class="bi bi-person"></i> Mon profil
      </a>
      <a class="topbar__dropdown-item" routerLink="/billing">
        <i class="bi bi-gem"></i> Abonnement
      </a>
      <a class="topbar__dropdown-item" routerLink="/profile/rgpd">
        <i class="bi bi-shield-check"></i> Confidentialité
      </a>
      <div class="topbar__dropdown-divider"></div>
      <button class="topbar__dropdown-item topbar__dropdown-item--danger" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i> Déconnexion
      </button>
    </div>

    <!-- Séparateur -->
    <div class="topbar__sep"></div>

    <!-- Notifications -->
    <div class="topbar__notif-wrapper">
      <button class="topbar__icon-btn" (click)="toggleNotifPanel()" aria-label="Notifications">
        <i class="bi bi-bell"></i>
        <span *ngIf="(unreadCount$ | async)! > 0" class="topbar__badge">
          {{ (unreadCount$ | async)! > 99 ? '99+' : (unreadCount$ | async) }}
        </span>
      </button>

      <div *ngIf="notifPanelOpen" class="topbar__notif-panel">
        <div class="topbar__notif-header">
          <div class="topbar__notif-header-left">
            <span class="topbar__notif-title">Notifications</span>
            <span *ngIf="(unreadCount$ | async)! > 0" class="topbar__notif-count">
              {{ unreadCount$ | async }}
            </span>
          </div>
          <button *ngIf="(unreadCount$ | async)! > 0"
                  class="topbar__notif-read-all"
                  (click)="markAllAsRead()">
            Tout lire
          </button>
        </div>

        <div class="topbar__notif-list">
          <div *ngIf="(notifications$ | async)?.length === 0" class="topbar__notif-empty">
            <i class="bi bi-bell-slash"></i>
            <span>Aucune notification</span>
          </div>

          <div *ngFor="let n of notifications$ | async"
               class="topbar__notif-item"
               [class.topbar__notif-item--unread]="!n.isRead"
               (click)="openNotification(n)">
            <div class="topbar__notif-icon">
              <i [class]="'bi ' + n.icon"></i>
            </div>
            <div class="topbar__notif-content">
              <div class="topbar__notif-name">{{ n.title }}</div>
              <div class="topbar__notif-body">{{ n.body }}</div>
              <div class="topbar__notif-time">{{ timeAgo(n.createdAt) }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div *ngIf="notifPanelOpen || dropdownOpen"
     class="topbar__backdrop"
     (click)="closeNotifPanel(); closeDropdown()"></div>
