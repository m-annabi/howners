<div class="gallery-container">
  <h2>Photos du bien</h2>

  <div class="error-message" *ngIf="error">
    {{ error }}
  </div>

  <div class="loading-spinner" *ngIf="loading">
    <div class="spinner"></div>
    <p>Chargement des photos...</p>
  </div>

  <div *ngIf="!loading && photos.length === 0" class="empty-state">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="64"
      height="64"
      fill="currentColor"
      viewBox="0 0 16 16"
    >
      <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
      <path
        d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"
      />
    </svg>
    <p>Aucune photo pour ce bien</p>
    <small *ngIf="editable">Utilisez le formulaire ci-dessous pour ajouter des photos</small>
  </div>

  <div
    *ngIf="!loading && photos.length > 0"
    cdkDropList
    [cdkDropListDisabled]="!editable"
    (cdkDropListDropped)="drop($event)"
    class="photo-grid"
  >
    <div
      *ngFor="let photo of photos"
      cdkDrag
      [cdkDragDisabled]="!editable"
      class="photo-card"
    >
      <div class="photo-image-container">
        <img [src]="photo.fileUrl" [alt]="photo.caption || photo.fileName" />

        <div class="photo-badges">
          <span class="badge badge-primary" *ngIf="photo.isPrimary">
            Photo de couverture
          </span>
        </div>

        <div class="photo-actions" *ngIf="editable">
          <button
            type="button"
            class="action-btn"
            *ngIf="!photo.isPrimary"
            (click)="setPrimary(photo)"
            title="Définir comme photo de couverture"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              viewBox="0 0 16 16"
            >
              <path
                d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"
              />
            </svg>
          </button>

          <button
            type="button"
            class="action-btn action-btn-danger"
            (click)="deletePhoto(photo)"
            title="Supprimer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              viewBox="0 0 16 16"
            >
              <path
                d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"
              />
              <path
                fill-rule="evenodd"
                d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"
              />
            </svg>
          </button>
        </div>

        <div class="drag-handle" *ngIf="editable" cdkDragHandle>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M7 2a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM7 5a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM7 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-3 3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-3 3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"
            />
          </svg>
        </div>
      </div>

      <div class="photo-info">
        <div class="caption-section" *ngIf="editingCaptionId !== photo.id">
          <p class="caption" *ngIf="photo.caption">{{ photo.caption }}</p>
          <p class="no-caption" *ngIf="!photo.caption">Aucune légende</p>
          <button
            type="button"
            class="edit-caption-btn"
            *ngIf="editable"
            (click)="startEditCaption(photo)"
          >
            Modifier
          </button>
        </div>

        <div class="caption-edit" *ngIf="editingCaptionId === photo.id">
          <input
            type="text"
            class="caption-input"
            [(ngModel)]="tempCaption"
            placeholder="Légende"
            (keyup.enter)="saveCaption(photo)"
            (keyup.escape)="cancelEditCaption()"
          />
          <div class="caption-actions">
            <button type="button" class="btn-save" (click)="saveCaption(photo)">
              Enregistrer
            </button>
            <button type="button" class="btn-cancel" (click)="cancelEditCaption()">
              Annuler
            </button>
          </div>
        </div>

        <small class="file-name">{{ photo.fileName }}</small>
      </div>
    </div>
  </div>

  <app-property-photo-upload
    *ngIf="editable"
    [propertyId]="propertyId"
    [currentPhotoCount]="currentPhotoCount"
    (photoUploaded)="onPhotoUploaded($event)"
  ></app-property-photo-upload>
</div>
