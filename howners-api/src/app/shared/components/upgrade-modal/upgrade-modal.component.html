<div *ngIf="visible" class="upgrade-overlay" (click)="onClose()">
  <div class="upgrade-modal" (click)="$event.stopPropagation()">

    <button class="upgrade-modal__close" (click)="onClose()" aria-label="Fermer">
      <i class="bi bi-x-lg"></i>
    </button>

    <div class="upgrade-modal__icon">
      <div class="hw-icon-circle hw-icon-circle--lg hw-icon-circle--accent">
        <i class="bi bi-arrow-up-circle-fill"></i>
      </div>
    </div>

    <h3 class="upgrade-modal__title">Passez au plan supérieur</h3>

    <p class="upgrade-modal__message">{{ message }}</p>

    <ul class="upgrade-modal__benefits">
      <li>
        <i class="bi bi-buildings"></i>
        <span>Plus de biens et de locations</span>
      </li>
      <li>
        <i class="bi bi-file-earmark-check"></i>
        <span>Contrats et signature électronique illimités</span>
      </li>
      <li>
        <i class="bi bi-shield-check"></i>
        <span>Fonctionnalités avancées et support prioritaire</span>
      </li>
    </ul>

    <div class="upgrade-modal__actions">
      <button class="hw-btn hw-btn--secondary" (click)="onClose()">
        Plus tard
      </button>
      <a class="hw-btn hw-btn--primary" routerLink="/billing/pricing" (click)="onViewPlans()">
        <i class="bi bi-arrow-up-circle"></i> Voir les plans
      </a>
    </div>

  </div>
</div>
