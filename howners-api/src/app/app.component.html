<div class="hw-layout" [class.hw-layout--guest]="!isAuthenticated">

  <!-- Sidebar — authenticated only -->
  <aside *ngIf="isAuthenticated"
         class="hw-sidebar"
         [class.hw-sidebar--open]="sidebarOpen">
    <app-sidebar (navigate)="closeSidebar()"></app-sidebar>
  </aside>

  <!-- Overlay mobile — authenticated only -->
  <div *ngIf="isAuthenticated && sidebarOpen"
       class="hw-sidebar-overlay"
       (click)="closeSidebar()"></div>

  <!-- Main area -->
  <div class="hw-main">
    <header *ngIf="isAuthenticated" class="hw-topbar">
      <app-topbar (toggleSidebar)="toggleSidebar()"></app-topbar>
    </header>
    <main class="hw-content" [class.hw-content--guest]="!isAuthenticated">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>

<app-toast></app-toast>
<app-confirm-dialog></app-confirm-dialog>
<app-nps-prompt *ngIf="isAuthenticated"></app-nps-prompt>
<app-upgrade-modal></app-upgrade-modal>
